<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Tracker</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 700px; margin: 50px auto; }
      button { font-size: 1rem; padding: 0.6rem 1.2rem; }
      #status { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Send Event</h1>
    <button id="sendBtn">Send Event</button>
    <div id="status"></div>

    <script>
      const sendBtn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");

      sendBtn.addEventListener("click", async () => {
        statusEl.textContent = "Sending event...";
        const payload = {
          userId: "u123",
          eventType: "click",
          page: "home"
        };

        try {
          const response = await fetch("/event", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }

          const text = await response.text();
          statusEl.textContent = `Success: ${text}`;
        } catch (error) {
          statusEl.textContent = `Error: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
